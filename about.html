<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About - ASTRONOMY & ASTROPHYSICS SOCIETY</title>
    <link rel="icon" type="image/png" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Background Canvas -->
    <div id="bg-canvas"></div>

    <section class="min-h-screen pt-32 pb-20 px-4 sm:px-6 lg:px-8">
        <div class="container mx-auto max-w-7xl">
            <div class="grid lg:grid-cols-2 gap-8 lg:gap-12 items-center">
                <div data-aos="fade-right" class="order-2 lg:order-1">
                    <h1 class="text-4xl sm:text-5xl lg:text-6xl font-bold mb-6 gradient-text text-center lg:text-left">Our Vision</h1>
                    <div class="holo-card p-6 sm:p-8 mb-6">
                        <p class="text-base sm:text-lg text-gray-300 leading-relaxed">
                            To foster a deep appreciation for astronomy among students by providing hands-on experience
                            with telescopes and research.
                        </p>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="holo-card p-4 text-center">
                            <h3 class="text-2xl sm:text-3xl font-bold text-white">5+</h3>
                            <p class="text-cyan-400 text-xs sm:text-sm">Telescopes</p>
                        </div>
                        <div class="holo-card p-4 text-center">
                            <h3 class="text-2xl sm:text-3xl font-bold text-white">150+</h3>
                            <p class="text-purple-400 text-xs sm:text-sm">Members</p>
                        </div>
                    </div>
                </div>
                <div class="relative order-1 lg:order-2 mb-8 lg:mb-0" data-aos="fade-left">
                    <div class="holo-card p-1 rounded-full border-4 border-cyan-500/20 w-48 h-48 sm:w-64 sm:h-64 mx-auto flex items-center justify-center bg-black">
                        <i class="fas fa-satellite text-4xl sm:text-6xl text-white animate-pulse"></i>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
