<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programs - ASTRONOMY & ASTROPHYSICS SOCIETY</title>
    <link rel="icon" type="image/png" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Background Canvas -->
    <div id="bg-canvas"></div>

    <section class="min-h-screen pt-32 pb-20 px-4 sm:px-6 lg:px-8">
        <div class="container mx-auto max-w-7xl text-center mb-12">
            <h1 class="text-4xl sm:text-5xl lg:text-6xl font-bold mb-4 gradient-text" data-aos="fade-down">Mission Logs</h1>
            <p class="text-gray-400 text-base sm:text-lg">Upcoming workshops, observations, and lectures.</p>
        </div>

        <div id="eventsGrid" class="container mx-auto max-w-7xl grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 sm:gap-8">
            <div class="col-span-full text-center py-20 text-cyan-500 animate-pulse">Scanning for signals...</div>
        </div>
    </section>

    <div id="programModal" class="fixed inset-0 z-[999] hidden">
        <div id="programModalBackdrop" class="absolute inset-0 bg-black/80 backdrop-blur-sm"></div>
        <div class="relative h-full w-full flex items-center justify-center p-4 sm:p-6">
            <div class="holo-card w-full max-w-5xl max-h-[85vh] overflow-hidden">
                <div class="flex items-center justify-between px-5 sm:px-6 py-4 border-b border-white/10">
                    <div class="min-w-0">
                        <h2 id="programModalTitle" class="text-xl sm:text-2xl font-heading text-white truncate"></h2>
                        <p id="programModalMeta" class="text-xs sm:text-sm text-cyan-400 mt-1"></p>
                    </div>
                    <button id="programModalClose" class="text-white/70 hover:text-white text-2xl leading-none px-2">&times;</button>
                </div>
                <div class="overflow-y-auto max-h-[calc(85vh-64px)] p-5 sm:p-6">
                    <div class="grid lg:grid-cols-2 gap-6">
                        <div>
                            <div class="h-56 sm:h-72 rounded-xl overflow-hidden border border-white/10 bg-black/40">
                                <img id="programModalBanner" src="" alt="Program image" class="w-full h-full object-cover">
                            </div>

                            <div class="mt-4">
                                <h3 class="text-sm font-bold text-white tracking-widest uppercase">Gallery</h3>
                                <div id="programModalGallery" class="mt-3 grid grid-cols-3 sm:grid-cols-4 gap-3"></div>
                            </div>
                        </div>

                        <div>
                            <h3 class="text-sm font-bold text-white tracking-widest uppercase">About</h3>
                            <p id="programModalDesc" class="mt-3 text-gray-300 text-sm sm:text-base leading-relaxed"></p>

                            <div class="mt-6">
                                <h3 class="text-sm font-bold text-white tracking-widest uppercase">Contributors</h3>
                                <div id="programModalContrib" class="mt-3 flex flex-wrap gap-2"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="js/config.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
